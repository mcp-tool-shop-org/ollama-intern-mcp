name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      # Fail loudly if the runner somehow booted with a Node version outside
      # our supported range. engines.node is ">=20.0.0"; the pinned runner
      # version is 22.
      - name: Assert Node major version (20.x or 22.x)
        run: |
          NODE_V="$(node --version)"
          echo "node --version: $NODE_V"
          case "$NODE_V" in
            v20.*|v22.*) echo "ok" ;;
            *) echo "::error::Unsupported Node version: $NODE_V (want v20.x or v22.x)"; exit 1 ;;
          esac

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      # v3
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        # v4
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
