name: CI

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".npmignore"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".npmignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Cross-OS matrix. Stage A surfaced Windows-specific bugs in the
    # primitives (shell-injection vector in batchProofCheck, path-with-spaces
    # handling in compileCheck, case-insensitivity bypass in protectedPaths)
    # that Linux-only CI would never catch. macOS is in the matrix because
    # the M5 Max profile is a documented first-class target. fail-fast: false
    # ensures one OS's flake doesn't mask another OS's real failure. Cost:
    # this triples (or quadruples, when both Node majors hit) the minutes the
    # verify job burns — that is the price of platform parity.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["20", "22"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      # Fail loudly if the runner somehow booted with a Node version outside
      # our supported range. engines.node is ">=20.0.0"; the matrix pins 20
      # and 22. Anything else means setup-node drifted and tests would give
      # misleading signal.
      - name: Assert Node major version (20.x or 22.x)
        shell: bash
        run: |
          NODE_V="$(node --version)"
          echo "node --version: $NODE_V"
          case "$NODE_V" in
            v20.*|v22.*) echo "ok" ;;
            *) echo "::error::Unsupported Node version: $NODE_V (want v20.x or v22.x)"; exit 1 ;;
          esac
      - name: Install (regenerate lockfile for runner platform)
        shell: bash
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "npm"
      - name: Assert Node major version (20.x or 22.x)
        run: |
          NODE_V="$(node --version)"
          echo "node --version: $NODE_V"
          case "$NODE_V" in
            v20.*|v22.*) echo "ok" ;;
            *) echo "::error::Unsupported Node version: $NODE_V (want v20.x or v22.x)"; exit 1 ;;
          esac
      - name: Install (regenerate lockfile for runner platform)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Dependency audit (production)
        run: npm audit --omit=dev --audit-level=high
