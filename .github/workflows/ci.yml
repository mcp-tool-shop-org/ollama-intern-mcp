name: CI

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".npmignore"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".npmignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # v4
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "npm"
      # Fail loudly if the runner somehow booted with a Node version outside
      # our supported range. engines.node is ">=20.0.0"; the pinned runner
      # version is 22. Anything else means setup-node drifted and tests would
      # give misleading signal.
      - name: Assert Node major version (20.x or 22.x)
        run: |
          NODE_V="$(node --version)"
          echo "node --version: $NODE_V"
          case "$NODE_V" in
            v20.*|v22.*) echo "ok" ;;
            *) echo "::error::Unsupported Node version: $NODE_V (want v20.x or v22.x)"; exit 1 ;;
          esac
      - name: Install (regenerate lockfile for runner platform)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # v4
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "npm"
      - name: Assert Node major version (20.x or 22.x)
        run: |
          NODE_V="$(node --version)"
          echo "node --version: $NODE_V"
          case "$NODE_V" in
            v20.*|v22.*) echo "ok" ;;
            *) echo "::error::Unsupported Node version: $NODE_V (want v20.x or v22.x)"; exit 1 ;;
          esac
      - name: Install (regenerate lockfile for runner platform)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Dependency audit (production)
        run: npm audit --omit=dev --audit-level=high
