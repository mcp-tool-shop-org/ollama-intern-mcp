name: CI

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".npmignore"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".npmignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "npm"
      - name: Install (regenerate lockfile for runner platform)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "npm"
      - name: Install (regenerate lockfile for runner platform)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Dependency audit (production)
        run: npm audit --omit=dev --audit-level=high
