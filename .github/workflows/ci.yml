name: CI

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install (regenerate lockfile for runner platform)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install (regenerate lockfile for runner platform)
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Dependency audit (production)
        run: npm audit --omit=dev --audit-level=high
