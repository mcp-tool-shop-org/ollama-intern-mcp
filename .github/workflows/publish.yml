name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g., v2.1.0). Must match package.json version."
        required: true
        type: string

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Assert Node major version (20.x or 22.x)
        run: |
          V=$(node --version)
          case "$V" in
            v20.*|v22.*) echo "Node $V ok";;
            *) echo "::error::Node $V not 20.x or 22.x"; exit 1;;
          esac

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          EXPECTED="v$PKG_VERSION"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag $TAG does not match package.json version $EXPECTED"
            exit 1
          fi
          echo "Tag $TAG matches package.json $PKG_VERSION"

      - name: Ship gate (typecheck + build + test + pack check)
        run: npm run ship

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
